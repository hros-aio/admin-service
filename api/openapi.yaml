openapi: 3.0.3
info:
  title: HROS Admin Service - Foundation
  version: 0.1.0
  description: Base foundation API for health and connectivity.

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the health status of the application and its dependencies.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /v1/auth/login:
    post:
      operationId: login
      tags:
        - Authentication
      summary: Admin Login
      description: Authenticate an admin user and return tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/auth/mfa/verify:
    post:
      operationId: mfaVerify
      tags:
        - Authentication
      summary: Verify MFA
      description: Complete MFA step for Super Admin after successful password auth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAVerifyRequest'
      responses:
        '200':
          description: Verification successful, returns access/refresh tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: MFA verification failed (MFA_INVALID) or session expired (MFA_TOKEN_EXPIRED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/auth/session:
    delete:
      operationId: logout
      tags:
        - Authentication
      summary: Logout
      description: Terminate the current session by revoking the refresh token.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/auth/refresh:
    post:
      operationId: refresh
      tags:
        - Authentication
      summary: Refresh Access Token
      description: Refresh the access token using a valid refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "def456..."
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: "OK"
        version:
          type: string
          example: "0.1.0"
        dependencies:
          type: object
          additionalProperties:
            type: string
          example:
            postgres: "UP"
            redis: "UP"
            kafka: "UP"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@hros.com
        password:
          type: string
          format: password
          example: "********"
        remember_me:
          type: boolean
          example: true

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "def456..."
        mfa_required:
          type: boolean
          example: true
        mfa_token:
          type: string
          example: "mfa_sess_abc123"
        mfa_methods:
          type: array
          items:
            type: string
          example: ["totp", "webauthn"]

    MFAVerifyRequest:
      type: object
      required:
        - mfa_token
        - method
      properties:
        mfa_token:
          type: string
          example: "mfa_sess_abc123"
        method:
          type: string
          enum: [totp, webauthn]
          example: totp
        code:
          type: string
          example: "123456"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: Request validation failed
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
          example: 01HZX3QK0YS6M2Z1WD9S7VN9VJ

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
